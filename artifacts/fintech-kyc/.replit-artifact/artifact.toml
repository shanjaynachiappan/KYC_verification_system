kind = "mobile"
previewPath = "/"
title = "VerifyPay – KYC Fintech App"
version = "1.0.0"
id = "artifacts/fintech-kyc"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/" ]
localPort = 18875

[services.development]
run = "pnpm --filter @workspace/fintech-kyc run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fintech-kyc", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/fintech-kyc", "run", "serve" ]

[services.env]
PORT = "18875"
BASE_PATH = "/"
